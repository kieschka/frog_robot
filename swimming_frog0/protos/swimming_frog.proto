                    children [
                      Shape {
                        appearance PBRAppearance {
                          baseColor 0.25 0.45 0.23
                          roughness 0.55
                        }
                        geometry Box { size 0.150 0.036 0.036 }
                      }
                    ]
                  }

                  HingeJoint {
                    jointParameters HingeJointParameters {
                      axis     0 0 1
                      anchor   -0.15 0 0
