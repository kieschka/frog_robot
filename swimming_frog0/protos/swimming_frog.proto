                  Pose {
                    translation -0.075 0 0
                    children [
                      Shape {
                        appearance PBRAppearance {
                          baseColor 0.25 0.45 0.23
                          roughness 0.55
                        }
                        geometry Box { size 0.150 0.036 0.036 }
                      }
                    ]
                  }

                  HingeJoint {
                    jointParameters HingeJointParameters {
                      axis     0 0 -1
                      anchor   -0.15 0 0
                      dampingConstant 0.30
                      minStop -0.7
                      maxStop  1.4
                    }
                    device [
                      RotationalMotor {
                        name        "ankleR"
                        maxTorque   1.6
                        maxVelocity 6.0
                        acceleration 100.0
                        minPosition -0.6
                        maxPosition  1.3
                      }
                      PositionSensor { name "ankleR_sensor" }
                    ]
                    endPoint Solid {
                      translation -0.15 0 0
                      rotation 0 0 1 -0.5236
                      children [
                        Pose {
                          translation 0 0.06 0
                          children [
                            Shape {
                              appearance PBRAppearance {
                                baseColor 0.18 0.45 0.18
                                roughness 0.50
                                metalness 0.05
                              }
                              geometry IndexedFaceSet {
                                coord Coordinate {
                                  point [
                                    0.0025 -0.06  0.025
                                   -0.0025 -0.06  0.025
                                   -0.0025 -0.06 -0.025
                                    0.0025 -0.06 -0.025
                                    0.0025  0.06  0.080
                                   -0.0025  0.06  0.080
                                   -0.0025  0.06 -0.080
                                    0.0025  0.06 -0.080
                                  ]
                                }
