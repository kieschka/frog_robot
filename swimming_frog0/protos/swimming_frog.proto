                      minStop -0.7
                      maxStop  1.4
                    }
                    device [
                      RotationalMotor {
                        name        "ankleL"
                        maxTorque   1.6
                        maxVelocity 6.0
                        acceleration 100.0
                        minPosition -0.6
                        maxPosition  1.3
                      }
