                    endPoint Solid {
                      translation -0.15 0 0
                      rotation 0 0 1 0.5236
                      children [
                        Pose {
                          translation 0 -0.06 0
                          children [
                            Shape {
                              appearance PBRAppearance {
                                baseColor 0.18 0.45 0.18
                                roughness 0.50
                                metalness 0.05
                              }
                              geometry IndexedFaceSet {
                                coord Coordinate {
                                  point [
                                    0.0025  0.07  0.005
                                   -0.0025  0.07  0.005
                                   -0.0025  0.07 -0.005
                                    0.0025  0.07 -0.005
                                    0.0025 -0.06  0.080
                                   -0.0025 -0.06  0.080
                                   -0.0025 -0.06 -0.080
                                    0.0025 -0.06 -0.080
                                  ]
                                }
                                coordIndex [
                                  0 1 5 4 -1
                                  3 7 6 2 -1
                                  0 4 7 3 -1
                                  1 2 6 5 -1
                                  0 3 2 1 -1
                                  4 5 6 7 -1
                                ]
                                creaseAngle 1.0
                              }
                            }
                          ]
                        }
                      ]
                      name           "footL"
                      boundingObject Pose {
                        translation 0 -0.06 0
                        children [ Box { size 0.005 0.13 0.075 } ]
                      }
                      physics Physics {
                        density -1
                        mass 0.10
                        centerOfMass [0 -0.06 0]
                      }
                      immersionProperties [ ImmersionProperties {
                        fluidName                          "water"
                        dragForceCoefficients              8.00 0.05 0.05
                        dragTorqueCoefficients             0.02 0.02 0.02
                        viscousResistanceForceCoefficient  1.0
                        viscousResistanceTorqueCoefficient 0.05
                      } ]
                    }
                  }
                ]
                name           "crusL"
                boundingObject Pose {
                  translation -0.075 0 0
                  children [ Box { size 0.130 0.040 0.040 } ]
                }
                physics Physics {
                  density -1
                  mass 0.30
                  centerOfMass [-0.075 0 0]
                }
                immersionProperties [ ImmersionProperties {
                  fluidName                          "water"
                  dragForceCoefficients              0.05 0.05 0.05
                  dragTorqueCoefficients             0.01 0.01 0.01
                  viscousResistanceForceCoefficient  1.0
                  viscousResistanceTorqueCoefficient 0.02
                } ]
              }
            }
          ]
          name           "thighL"
          boundingObject Pose {
            translation -0.065 0 0
            children [ Box { size 0.130 0.040 0.040 } ]
          }
          physics Physics {
            density -1
            mass 0.30
            centerOfMass [-0.065 0 0]
          }
          immersionProperties [ ImmersionProperties {
            fluidName                          "water"
            dragForceCoefficients              0.05 0.05 0.05
            dragTorqueCoefficients             0.01 0.01 0.01
            viscousResistanceForceCoefficient  1.0
            viscousResistanceTorqueCoefficient 0.02
          } ]
        }
      }
    ]

    name IS name
    boundingObject Box { size 0.42 0.20 0.10 }
    physics Physics {
      density -1
      mass 5.5
      centerOfMass [ 0 0 -0.025 ]
    }
    immersionProperties [ ImmersionProperties {
      fluidName                          "water"
      dragForceCoefficients              0.08 0.40 0.40
      dragTorqueCoefficients             0.05 0.05 0.05
      viscousResistanceForceCoefficient  1.0
      viscousResistanceTorqueCoefficient 0.05
    } ]
  }
}
