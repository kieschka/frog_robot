          immersionProperties [ ImmersionProperties {
            fluidName                          "water"
            dragForceCoefficients              0.05 0.05 0.05
            dragTorqueCoefficients             0.01 0.01 0.01
            viscousResistanceForceCoefficient  1.0
            viscousResistanceTorqueCoefficient 0.02
          } ]
        }
      }

      # ============== LEFT LEG (mirror) ==============
      HingeJoint {
        jointParameters HingeJointParameters {
          axis     0 0 1
          anchor   -0.12 -0.075 -0.01
          dampingConstant 0.30
          minStop -0.7
          maxStop  1.7
        }
        device [
          RotationalMotor {
            name        "hipL"
            maxTorque   4.0
            maxVelocity 6.0
            acceleration 100.0
            minPosition -0.6
            maxPosition  1.6
          }
          PositionSensor { name "hipL_sensor" }
        ]
        endPoint Solid {
          translation -0.12 -0.075 -0.01
          rotation 0 0 1 0.5236
          children [
            Pose {
              translation -0.065 0 0
              children [
                Shape {
                  appearance PBRAppearance {
                    baseColor 0.30 0.50 0.28
                    roughness 0.55
                  }
                  geometry Box { size 0.130 0.040 0.040 }
                }
              ]
            }

            HingeJoint {
              jointParameters HingeJointParameters {
                axis     0 0 1
                anchor   -0.13 0 0
                dampingConstant 0.30
                minStop -2.4
                maxStop  0.1
              }
              device [
                RotationalMotor {
                  name        "kneeL"
                  maxTorque   3.0
                  maxVelocity 6.0
                  acceleration 100.0
                  minPosition -2.3
