#VRML_SIM R2025a utf8

PROTO swimming_frog [
  field SFVec3f    translation         0 0 1.40
  field SFRotation rotation            0 0 1 0
  field SFString   name                "frog"
  field SFString   controller          "frog_controller"
  field SFString   customData          ""
  field SFBool     supervisor          TRUE
]
{
  Robot {
    translation IS translation
    rotation    IS rotation
    name        IS name
    controller  IS controller
    customData  IS customData
    supervisor  IS supervisor

    children [
      GPS          { name "gps"   }
      InertialUnit { name "imu"   }
      Gyro         { name "gyro"  }
      Accelerometer{ name "accel" }

      # ===== ТЕЛО (овальный эллипсоид) =====
      Transform {
        translation 0 0 0
        scale       0.21 0.10 0.05
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.32 0.55 0.30
              roughness 0.55
              metalness 0.05
            }
            geometry Sphere { radius 1 subdivision 4 }
          }
        ]
      }

      # ============== RIGHT LEG ==============
      HingeJoint {
        jointParameters HingeJointParameters {
          axis     0 0 -1
          anchor   -0.12 0.075 -0.01
          dampingConstant 0.30
          minStop -0.7
          maxStop  1.7
        }
        device [
          RotationalMotor {
            name        "hipR"
            maxTorque   4.0
            maxVelocity 6.0
            acceleration 100.0
            minPosition -0.6
            maxPosition  1.6
          }
          PositionSensor { name "hipR_sensor" }
        ]
        endPoint Solid {
          translation -0.12 0.075 -0.01
          rotation 0 0 1 -0.5236
          children [
            Pose {
              translation -0.065 0 0
              children [
                Shape {
                  appearance PBRAppearance {
                    baseColor 0.30 0.50 0.28
                    roughness 0.55
                  }
                  geometry Box { size 0.130 0.040 0.040 }
                }
              ]
            }

            HingeJoint {
              jointParameters HingeJointParameters {
                axis     0 0 -1
                anchor   -0.13 0 0
                dampingConstant 0.30
                minStop -2.4
                maxStop  0.1
              }
              device [
                RotationalMotor {
                  name        "kneeR"
                  maxTorque   3.0
                  maxVelocity 6.0
                  acceleration 100.0
                  minPosition -2.3
                  maxPosition  0.0
                }
                PositionSensor { name "kneeR_sensor" }
              ]
              endPoint Solid {
                translation -0.13 0 0
                rotation 0 0 1 0.349
